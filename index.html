<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>返工返修数据管理系统</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: { DEFAULT:'#1e40af', light:'#3b82f6', dark:'#1e3a8a' } } } }
    }
  </script>

  <style>
    body { font-family:'Microsoft YaHei','PingFang SC',sans-serif; background:#f0f4f8; }
    .tab-btn.active { border-bottom:3px solid #1e40af; color:#1e40af; font-weight:600; }
    .chart-container { position:relative; height:260px; }
    @media (max-width:768px) {
      .table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
      .hide-mobile { display:none !important; }
    }
    .stat-card { transition:all .2s ease; cursor:default; }
    .stat-card:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(30,64,175,.15); }
    tbody tr:hover  { background:#eff6ff !important; }
    tbody tr.selected-row { background:#dbeafe !important; }
    tbody tr { cursor:pointer; }
    .modal-enter { animation:fadeIn .15s ease; }
    .modal-box-enter { animation:slideUp .2s ease; }
    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    #toast { transition:opacity .3s ease; }
    #detailPanel { transition:transform .25s ease, opacity .25s ease; }
    #detailPanel.hidden-panel { transform:translateX(100%); opacity:0; pointer-events:none; }
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:#f1f5f9; }
    ::-webkit-scrollbar-thumb { background:#94a3b8; border-radius:3px; }
    @media print {
      header,footer,.no-print { display:none !important; }
      body { background:#fff; }
      .bg-white { box-shadow:none !important; border:1px solid #ddd !important; }
    }
    #pwMask { position:fixed;inset:0;background:linear-gradient(135deg,#1e3a8a,#1e40af);z-index:200;display:flex;align-items:center;justify-content:center; }
    #pwMask.hidden { display:none; }

    /* ===== 二维码扫描器 ===== */
    #qrModal { position:fixed;inset:0;background:#000;z-index:300;display:flex;flex-direction:column; }
    #qrModal.hidden { display:none; }
    #qrVideo { width:100%;height:100%;object-fit:cover;display:block; }
    .qr-overlay { position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,0.55) 70%); }
    .qr-frame { position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);width:min(65vw,260px);height:min(65vw,260px);border:2px solid rgba(255,255,255,.3);border-radius:12px; }
    .qr-frame::before,.qr-frame::after,.qr-frame-inner::before,.qr-frame-inner::after { content:'';position:absolute;width:22px;height:22px;border-color:#4ade80;border-style:solid; }
    .qr-frame::before  { top:-2px;left:-2px;border-width:4px 0 0 4px;border-radius:4px 0 0 0; }
    .qr-frame::after   { top:-2px;right:-2px;border-width:4px 4px 0 0;border-radius:0 4px 0 0; }
    .qr-frame-inner::before { bottom:-2px;left:-2px;border-width:0 0 4px 4px;border-radius:0 0 0 4px; }
    .qr-frame-inner::after  { bottom:-2px;right:-2px;border-width:0 4px 4px 0;border-radius:0 0 4px 0; }
    .scan-line { position:absolute;left:8px;right:8px;height:2px;background:linear-gradient(to right,transparent,#4ade80,transparent);box-shadow:0 0 6px rgba(74,222,128,.8);animation:scanAnim 2s ease-in-out infinite; }
    @keyframes scanAnim { 0%,100%{top:10px} 50%{top:calc(100% - 12px)} }

    /* ===== 照片 ===== */
    .photo-thumb-wrap { position:relative;aspect-ratio:1/1;overflow:hidden;border-radius:10px;background:#f1f5f9;border:1px solid #e2e8f0;cursor:pointer;transition:transform .15s; }
    .photo-thumb-wrap:hover { transform:scale(1.03); }
    .photo-thumb-wrap img { width:100%;height:100%;object-fit:cover;display:block; }
    .photo-del-btn { position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(239,68,68,.85);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;line-height:1; }
    .photo-add-slot { aspect-ratio:1/1;border:2px dashed #cbd5e1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;transition:all .15s;background:#f8fafc;color:#94a3b8;font-size:11px; }
    .photo-add-slot:hover { border-color:#3b82f6;color:#3b82f6;background:#eff6ff; }
    #lightbox { position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:400;display:flex;align-items:center;justify-content:center;cursor:zoom-out; }
    #lightbox.hidden { display:none; }
    #lightboxImg { max-width:96vw;max-height:90vh;object-fit:contain;border-radius:8px;cursor:default; }
    #lightboxClose { position:absolute;top:16px;right:20px;width:40px;height:40px;background:rgba(255,255,255,.15);border:none;border-radius:50%;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center; }
    #lightboxCaption { position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.7);font-size:12px; }
    .upload-btn { display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 14px;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;user-select:none; }
    .upload-btn-camera { background:#eff6ff;border:1.5px solid #bfdbfe;color:#1d4ed8; }
    .upload-btn-camera:hover { background:#dbeafe; }
    .upload-btn-gallery { background:#f8fafc;border:1.5px solid #e2e8f0;color:#475569; }
    .upload-btn-gallery:hover { background:#f1f5f9; }

    /* ===== 云端状态 ===== */
    #cloudStatus { transition:all .3s ease; }
    .cloud-dot { width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px; }
    @keyframes pulseDot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
    .cloud-dot.syncing { animation:pulseDot .8s ease-in-out infinite; }
    #offlineBar { transition:all .3s; }

    /* ===== 产品名称组合框 ===== */
    .product-combo-select { width:100%;padding:8px 12px;border-radius:8px;border:1px solid #d1d5db;font-size:14px;background:#fff;outline:none; }
    .product-combo-select:focus { ring:2px solid #60a5fa; border-color:#60a5fa; }
  </style>
</head>
<body>

<!-- ===== 密码遮罩 ===== -->
<div id="pwMask" class="hidden">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm mx-4 text-center">
    <div class="w-14 h-14 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg class="w-7 h-7 text-blue-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
    </div>
    <h2 class="text-lg font-bold text-gray-800 mb-1">管理员后台</h2>
    <p class="text-gray-500 text-sm mb-5">请输入访问密码</p>
    <input type="password" id="pwInput" placeholder="输入密码后按 Enter"
      class="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none mb-3"
      onkeydown="if(event.key==='Enter')verifyPassword()" />
    <p id="pwError" class="text-red-500 text-xs mb-3 hidden">密码错误，请重试</p>
    <button onclick="verifyPassword()" class="w-full py-2.5 bg-blue-700 hover:bg-blue-800 text-white font-semibold rounded-xl text-sm">进入管理后台</button>
  </div>
</div>

<!-- ===== 顶部导航栏 ===== -->
<header class="bg-gradient-to-r from-blue-900 to-blue-700 text-white shadow-lg sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-white bg-opacity-20 rounded-lg flex items-center justify-center shrink-0">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
      </div>
      <div>
        <h1 class="text-base sm:text-lg font-bold leading-tight">返工返修数据管理系统</h1>
        <p class="text-blue-200 text-xs" id="headerSubtitle">加载中...</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <div id="cloudStatus" class="hidden sm:flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs bg-white bg-opacity-15">
        <span class="cloud-dot bg-gray-400" id="cloudDot"></span>
        <span id="cloudStatusText">本地模式</span>
      </div>
      <span id="modeBadge" class="hidden sm:inline-flex items-center px-2 py-1 rounded-full text-xs font-medium"></span>
      <a id="switchModeBtn" href="" class="text-blue-200 hover:text-white text-xs underline hidden no-print"></a>
    </div>
  </div>
</header>

<!-- ===== 离线队列提示条 ===== -->
<div id="offlineBar" class="hidden bg-yellow-500 text-white text-xs text-center py-2 px-4 sticky top-14 z-40 no-print">
  ⚠️ 网络离线，数据已暂存本地。
  <button onclick="syncOfflineQueue()" class="ml-3 underline font-semibold">立即同步</button>
  <span id="offlineCount" class="ml-2 bg-white text-yellow-700 px-1.5 py-0.5 rounded-full font-bold">0</span> 条待同步
</div>

<!-- ===== Toast ===== -->
<div id="toast" class="fixed top-16 left-1/2 -translate-x-1/2 z-[150] bg-gray-800 text-white px-5 py-2.5 rounded-xl shadow-xl text-sm opacity-0 pointer-events-none select-none max-w-xs text-center"></div>

<!-- ===== 主内容区 ===== -->
<main id="app" class="max-w-7xl mx-auto px-4 py-5"></main>

<!-- ===== 行详情侧边面板 ===== -->
<div id="detailPanel" class="hidden-panel fixed top-0 right-0 h-full w-full sm:w-96 bg-white shadow-2xl z-40 overflow-y-auto">
  <div class="flex items-center justify-between p-4 border-b bg-gray-50 sticky top-0">
    <h3 class="text-sm font-bold text-gray-800">📄 记录详情</h3>
    <button onclick="closeDetailPanel()" class="w-8 h-8 rounded-full bg-white border border-gray-200 shadow-sm flex items-center justify-center text-gray-500">✕</button>
  </div>
  <div id="detailContent" class="p-5"></div>
</div>
<div id="detailOverlay" onclick="closeDetailPanel()" class="hidden fixed inset-0 bg-black bg-opacity-30 z-30"></div>

<!-- ===== 编辑弹窗 ===== -->
<div id="editModal" class="modal-enter hidden fixed inset-0 bg-black bg-opacity-40 z-50 flex items-center justify-center p-4">
  <div class="modal-box-enter bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
    <div class="flex items-center justify-between p-5 border-b">
      <h3 class="text-base font-bold text-gray-800" id="editModalTitle">编辑记录</h3>
      <button onclick="closeEditModal()" class="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500">✕</button>
    </div>
    <div id="editModalBody" class="p-5"></div>
    <div class="flex justify-end gap-3 p-5 border-t">
      <button onclick="closeEditModal()" class="px-4 py-2 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 text-sm">取消</button>
      <button onclick="saveEditRecord()" class="px-5 py-2 rounded-lg bg-blue-700 text-white hover:bg-blue-800 text-sm font-medium">保存</button>
    </div>
  </div>
</div>

<!-- ===== 质检判定弹窗 ===== -->
<div id="qcModal" class="modal-enter hidden fixed inset-0 bg-black bg-opacity-40 z-50 flex items-center justify-center p-4">
  <div class="modal-box-enter bg-white rounded-2xl shadow-2xl w-full max-w-md">
    <div class="flex items-center justify-between p-5 border-b">
      <h3 class="text-base font-bold text-gray-800">🔍 质检判定</h3>
      <button onclick="closeQCModal()" class="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500">✕</button>
    </div>
    <div class="p-5 space-y-4">
      <div id="qcRecordSummary" class="bg-blue-50 border border-blue-100 rounded-xl p-3 text-sm text-blue-800"></div>
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1">判定人姓名 <span class="text-red-500">*</span></label>
        <input type="text" id="qcJudgeInput" placeholder="请输入判定人姓名" maxlength="20"
          class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-400 focus:outline-none text-sm"/>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-2">审核结果 <span class="text-red-500">*</span></label>
        <div class="grid grid-cols-2 gap-3">
          <label class="flex items-center gap-2 p-3 border-2 rounded-xl cursor-pointer transition-all hover:border-green-400"
            id="qcOptPass" onclick="selectQCResult('返修合格')">
            <input type="radio" name="qcResult" value="返修合格" class="hidden"/>
            <span class="w-5 h-5 rounded-full border-2 border-gray-300 flex items-center justify-center shrink-0" id="qcDotPass">
              <span class="w-2.5 h-2.5 rounded-full hidden bg-green-500" id="qcDotPassInner"></span>
            </span>
            <span class="text-sm font-medium text-green-700">✅ 返修合格</span>
          </label>
          <label class="flex items-center gap-2 p-3 border-2 rounded-xl cursor-pointer transition-all hover:border-red-400"
            id="qcOptFail" onclick="selectQCResult('返修不合格')">
            <input type="radio" name="qcResult" value="返修不合格" class="hidden"/>
            <span class="w-5 h-5 rounded-full border-2 border-gray-300 flex items-center justify-center shrink-0" id="qcDotFail">
              <span class="w-2.5 h-2.5 rounded-full hidden bg-red-500" id="qcDotFailInner"></span>
            </span>
            <span class="text-sm font-medium text-red-700">❌ 返修不合格</span>
          </label>
        </div>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1">质检备注 <span class="text-gray-400 font-normal">（选填）</span></label>
        <textarea id="qcRemarkInput" rows="2" placeholder="补充质检说明..." maxlength="200"
          class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-400 focus:outline-none text-sm resize-none"></textarea>
      </div>
    </div>
    <div class="flex justify-end gap-3 p-5 border-t">
      <button onclick="closeQCModal()" class="px-4 py-2 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 text-sm">取消</button>
      <button onclick="saveQCResult()" class="px-5 py-2 rounded-lg bg-purple-700 hover:bg-purple-800 text-white text-sm font-medium">✅ 提交判定</button>
    </div>
  </div>
</div>

<!-- ===== 确认弹窗 ===== -->
<div id="confirmModal" class="modal-enter hidden fixed inset-0 bg-black bg-opacity-40 z-50 flex items-center justify-center p-4">
  <div class="modal-box-enter bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
    <div class="flex items-start gap-3 mb-5">
      <div class="w-10 h-10 shrink-0 rounded-full bg-red-100 flex items-center justify-center mt-0.5">
        <svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
      </div>
      <div>
        <h3 class="text-base font-bold text-gray-800 mb-1">确认操作</h3>
        <p class="text-gray-500 text-sm leading-relaxed" id="confirmMsg">确定？</p>
      </div>
    </div>
    <div class="flex justify-end gap-3">
      <button onclick="closeConfirmModal()" class="px-4 py-2 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 text-sm">取消</button>
      <button id="confirmOkBtn" class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700 text-sm font-medium">确认</button>
    </div>
  </div>
</div>

<!-- ===== 二维码扫描器 ===== -->
<div id="qrModal" class="hidden">
  <div class="flex items-center justify-between px-4 py-3 bg-black bg-opacity-60 relative z-10">
    <div>
      <p class="text-white font-semibold text-sm">📷 扫描二维码 / 条形码</p>
      <p class="text-green-300 text-xs mt-0.5">扫码内容将自动填入「批次号」</p>
    </div>
    <button onclick="stopQRScanner()" class="w-9 h-9 rounded-full bg-white bg-opacity-20 text-white flex items-center justify-center text-lg">✕</button>
  </div>
  <div class="flex-1 relative overflow-hidden">
    <video id="qrVideo" autoplay playsinline muted class="w-full h-full object-cover"></video>
    <canvas id="qrCanvas" class="hidden absolute top-0 left-0"></canvas>
    <div class="qr-overlay pointer-events-none"></div>
    <div class="qr-frame pointer-events-none" id="qrFrame">
      <div class="qr-frame-inner"></div>
      <div class="scan-line"></div>
    </div>
    <div class="absolute bottom-0 left-0 right-0 pb-6 flex flex-col items-center gap-2 pointer-events-none">
      <p id="qrStatus" class="bg-black bg-opacity-50 text-white text-xs px-4 py-1.5 rounded-full">正在启动摄像头...</p>
    </div>
  </div>
  <div class="px-4 py-4 bg-black bg-opacity-60 flex gap-3">
    <button onclick="stopQRScanner()" class="flex-1 py-3 border border-white border-opacity-30 text-white rounded-xl text-sm">取消</button>
    <button id="qrTorchBtn" onclick="toggleTorch()" class="flex-1 py-3 border border-white border-opacity-30 text-white rounded-xl text-sm hidden">🔦 手电筒</button>
  </div>
</div>

<!-- ===== Lightbox ===== -->
<div id="lightbox" class="hidden" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()" />
  <button id="lightboxClose" onclick="closeLightbox()">✕</button>
  <p id="lightboxCaption"></p>
</div>

<script>
/* ============================================================
   模块一：常量 & 默认配置
   ============================================================ */
const LS_KEY         = 'rework_records_v1';
const LS_CONFIG_KEY  = 'rework_config_v1';
const LS_MEMORY_KEY  = 'rework_memory_v1';
const LS_CLOUD_KEY   = 'rework_cloud_config_v1';
const LS_OFFLINE_KEY = 'rework_offline_queue_v1';
const LS_QC_KEY      = 'rework_qc_results_v1';   // 质检结果本地持久化
const PAGE_SIZES     = [10, 20, 50, 100];
const MAX_PHOTOS     = 3;
const PHOTO_MAX_PX   = 1024;
const PHOTO_QUALITY  = 0.72;
const POLL_INTERVAL  = 5000;

const DEFAULT_CONFIG = {
  companyName: '某某制造有限公司',
  adminPassword: '',
  productOptions: [],           // ★ 产品名称预设列表（可自定义创建）
  defectTypeOptions: ['尺寸超差','外观不良','装配不良','性能不达标','材料缺陷','焊接不良','涂装不良','其他'],
  disposeOptions: ['返工','返修','报废','让步接收','退供应商'],
};

/* ============================================================
   模块二：系统配置读写（本地缓存 + 云端同步）
   ============================================================ */

// 内存缓存：启动时从云端拉取，后续同步读取，避免 async 污染全局
let _appConfig = null;

/** 同步读取配置（从内存缓存，启动时已加载） */
function getConfig() {
  if (_appConfig) return _appConfig;
  // 兜底：云端未加载前读本地
  try { const r=localStorage.getItem(LS_CONFIG_KEY); return r?{...DEFAULT_CONFIG,...JSON.parse(r)}:{...DEFAULT_CONFIG}; }
  catch { return {...DEFAULT_CONFIG}; }
}

/** 保存配置：同步写本地 + 异步推送云端 */
function saveConfig(cfg) {
  _appConfig = { ...cfg };
  localStorage.setItem(LS_CONFIG_KEY, JSON.stringify(cfg));
  // 异步推送到 Supabase（不阻塞 UI）
  pushConfigToCloud(cfg).catch(e => console.warn('配置云端同步失败:', e));
}

/** 推送配置到 Supabase rework_config 表 */
async function pushConfigToCloud(cfg) {
  const cc = getCloudConfig();
  if (!cc.url || !cc.key) return;
  const base = cc.url.replace(/\/$/, '') + '/rest/v1/rework_config';
  const headers = {
    'Content-Type': 'application/json',
    'apikey': cc.key,
    'Authorization': `Bearer ${cc.key}`,
    'Prefer': 'resolution=merge-duplicates,return=minimal',
  };
  await fetch(base, {
    method: 'POST',
    headers,
    body: JSON.stringify({ key: 'system', value: cfg, updated_at: new Date().toISOString() }),
  });
}

/** 从 Supabase 拉取配置并更新本地缓存 */
async function pullConfigFromCloud() {
  const cc = getCloudConfig();
  if (!cc.url || !cc.key) return null;
  try {
    const base = cc.url.replace(/\/$/, '') + '/rest/v1/rework_config';

const FIELD_TO_DB = {
  productName:'product_name', batchNo:'batch_no',
  defectType:'defect_type', workHours:'work_hours',
  createdAt:'created_at', updatedAt:'updated_at',
  qcStatus:'qc_status', qcJudge:'qc_judge',
  qcTime:'qc_time',     qcRemark:'qc_remark',
};
// Supabase 表中合法的 JS 字段名集合（只发这些字段，避免多余字段触发 HTTP 400）
const DB_ALLOWED_FIELDS = new Set([
  'id','date','productName','batchNo','qty','defectType','dispose',
  'operator','remark','photos','workHours','createdAt','updatedAt',
  'qcStatus','qcJudge','qcTime','qcRemark',
]);
const DB_TO_FIELD = Object.fromEntries(Object.entries(FIELD_TO_DB).map(([k,v])=>[v,k]));
// 转换为 DB 行时：仅发送白名单字段，且跳过 null/undefined/空字符串
function toDBRow(rec) {
  const r={};
  for(const[k,v] of Object.entries(rec)) {
    if(!DB_ALLOWED_FIELDS.has(k)) continue;       // 过滤 dept 等非法字段
    if(v===null||v===undefined||v==='') continue; // 过滤空值
    r[FIELD_TO_DB[k]||k]=v;
  }
  return r;
}
function fromDBRow(row) { const r={}; for(const[k,v] of Object.entries(row)) r[DB_TO_FIELD[k]||k]=v; return r; }

const CloudDB = {
  enabled() { const c=getCloudConfig(); return !!(c.url&&c.key); },
  headers() {
    const c=getCloudConfig();
    return { 'Content-Type':'application/json', 'apikey':c.key, 'Authorization':`Bearer ${c.key}`, 'Prefer':'return=representation' };
  },
  base() { return getCloudConfig().url.replace(/\/$/,'')+'/rest/v1/rework_records'; },
  async _fetch(url,opts={},timeout=10000) {
    const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),timeout);
    try { const r=await fetch(url,{...opts,signal:ctrl.signal}); clearTimeout(t); return r; }
    catch(e) { clearTimeout(t); throw e; }
  },
  async getAll() {
    if(!this.enabled()) return applyQCStore(getAllRecordsLocal());
    try {
      setCloudStatus('syncing');
      const res=await this._fetch(this.base()+'?order=created_at.desc&limit=2000',{headers:this.headers()});
      if(!res.ok) throw new Error('HTTP '+res.status);
      setCloudStatus('ok');
      // 叠加本地 QC store，防止 Supabase 表无 qc 列时轮询覆盖判定结果
      return applyQCStore((await res.json()).map(fromDBRow));
    } catch(e) { setCloudStatus('error'); return applyQCStore(getAllRecordsLocal()); }
  },
  async add(rec) {
    if(!this.enabled()) return addRecordLocal(rec);
    try {
      setCloudStatus('syncing');
      const res=await this._fetch(this.base(),{method:'POST',headers:this.headers(),body:JSON.stringify(toDBRow(rec))});
      if(!res.ok) throw new Error('HTTP '+res.status);
      setCloudStatus('ok');
      const rows=await res.json(); return fromDBRow(Array.isArray(rows)?rows[0]:rows);
    } catch(e) {
      setCloudStatus('error'); addToOfflineQueue({action:'add',rec}); addRecordLocal(rec); return rec;
    }
  },
  async update(id,patch) {
    if(!this.enabled()) return updateRecordLocal(id,patch);
    try {
      setCloudStatus('syncing');
      const dbPatch = toDBRow(patch);
      const res=await this._fetch(this.base()+`?id=eq.${encodeURIComponent(id)}`,{
        method:'PATCH',
        headers:{...this.headers(), 'Prefer':'return=representation'},
        body:JSON.stringify(dbPatch)
      });
      if(!res.ok) throw new Error('HTTP '+res.status);
      const rows = await res.json();
      // 如果 Supabase 表缺少 qc_status 等列，返回的行里这些字段会是 undefined
      if(Array.isArray(rows) && rows.length > 0 && 'qc_status' in dbPatch && !('qc_status' in rows[0])) {
        console.error('Supabase 表缺少 qc_status 列，请在 Table Editor 中添加该列！');
      }
      setCloudStatus('ok'); return true;
    } catch(e) { setCloudStatus('error'); return updateRecordLocal(id,patch); }
  },
  async delete(id) {
    if(!this.enabled()) return deleteRecordLocal(id);
    try {
      setCloudStatus('syncing');
      const res=await this._fetch(this.base()+`?id=eq.${encodeURIComponent(id)}`,{method:'DELETE',headers:this.headers()});
      if(!res.ok) throw new Error('HTTP '+res.status); setCloudStatus('ok');
    } catch(e) { setCloudStatus('error'); deleteRecordLocal(id); }
  },
  async deleteMany(ids) {
    if(!this.enabled()) return deleteManyRecordsLocal(ids);
    try {
      setCloudStatus('syncing');
      const ic=ids.map(id=>encodeURIComponent(id)).join(',');
      const res=await this._fetch(this.base()+`?id=in.(${ic})`,{method:'DELETE',headers:this.headers()});
      if(!res.ok) throw new Error('HTTP '+res.status); setCloudStatus('ok');
    } catch(e) { setCloudStatus('error'); deleteManyRecordsLocal(ids); }
  },
  async testConnection(url,key) {
    try {
      const res=await this._fetch(url.replace(/\/$/,'')+'/rest/v1/rework_records?limit=1',{headers:{'apikey':key,'Authorization':`Bearer ${key}`}},8000);
      if([200,404,406].includes(res.status)) return {ok:true};
      return {ok:false,msg:`HTTP ${res.status}`};
    } catch(e) { return {ok:false,msg:e.name==='AbortError'?'连接超时':e.message}; }
  },
};

/* ============================================================
   质检结果本地持久化：{ [id]: {qcStatus, qcJudge, qcTime, qcRemark} }
   用于在 Supabase 表缺少 qc 列时，保证刷新和轮询后状态不丢失
   ============================================================ */
function getQCStore() {
  try { return JSON.parse(localStorage.getItem(LS_QC_KEY) || '{}'); } catch { return {}; }
}
function saveQCStore(store) {
  localStorage.setItem(LS_QC_KEY, JSON.stringify(store));
}
/** 写入一批质检结果 */
function writeQCResults(ids, patch) {
  const store = getQCStore();
  const qcPatch = { qcStatus: patch.qcStatus, qcJudge: patch.qcJudge, qcTime: patch.qcTime, qcRemark: patch.qcRemark };
  ids.forEach(id => { store[id] = { ...store[id], ...qcPatch }; });
  saveQCStore(store);
}
/** 把本地 QC store 叠加到记录列表（getAll 返回后调用）
 *  规则：云端已有质检数据（qcStatus 不为空）时以云端为准，
 *        云端缺失时才用本地 store 兜底，避免覆盖其他设备的判定结果。
 */
function applyQCStore(list) {
  const store = getQCStore();
  if (!Object.keys(store).length) return list;
  return list.map(r => {
    if (store[r.id] && !r.qcStatus) return { ...r, ...store[r.id] };
    return r;
  });
}
function filterRecords(list, f) {
  return list.filter(r => {
    const s=v=>(v||'');
    if(f.defectType && s(r.defectType)!==f.defectType) return false;
    if(f.dispose    && s(r.dispose)   !==f.dispose)    return false;
    if(f.operator   && !s(r.operator).includes(f.operator)) return false;
    if(f.dateFrom   && s(r.date)<f.dateFrom) return false;
    if(f.dateTo     && s(r.date)>f.dateTo)   return false;
    if(f.qcStatus   && s(r.qcStatus)  !==f.qcStatus)   return false;
    if(f.keyword) {
      const kw=f.keyword.toLowerCase();
      if(!(s(r.productName)+s(r.batchNo)+s(r.operator)+s(r.remark)).toLowerCase().includes(kw)) return false;
    }
    return true;
  });
}

function getOfflineQueue() { try { return JSON.parse(localStorage.getItem(LS_OFFLINE_KEY)||'[]'); } catch { return []; } }
function saveOfflineQueue(q) { localStorage.setItem(LS_OFFLINE_KEY, JSON.stringify(q)); }
function addToOfflineQueue(item) { const q=getOfflineQueue(); q.push(item); saveOfflineQueue(q); updateOfflineBar(); }
function updateOfflineBar() {
  const q=getOfflineQueue(),bar=document.getElementById('offlineBar'),cnt=document.getElementById('offlineCount');
  if(!bar)return; if(q.length>0){bar.classList.remove('hidden');if(cnt)cnt.textContent=q.length;}else bar.classList.add('hidden');
}
async function syncOfflineQueue() {
  const q=getOfflineQueue(); if(!q.length){showToast('无待同步记录','info');return;}
  if(!CloudDB.enabled()){showToast('请先配置云端连接','warn');return;}
  let ok=0,fail=0,lastErrMsg=''; const remaining=[];
  for(const item of q) {
    try {
      if(item.action==='add') {
        const res=await CloudDB._fetch(CloudDB.base(),{method:'POST',headers:CloudDB.headers(),body:JSON.stringify(toDBRow(item.rec))});
        if(res.ok || res.status===409){
          // 200/201 成功；409 说明之前其实已写入，均视为成功
          ok++; deleteRecordLocal(item.rec.id);
        } else {
          remaining.push(item); fail++;
          if(res.status===503||res.status===0) lastErrMsg='云端服务暂停，请登录 Supabase 控制台点击 Restore 恢复项目';
          else if(res.status===401||res.status===403) lastErrMsg='云端密钥无效，请在系统设置中重新配置';
          else lastErrMsg=`服务器返回错误 HTTP ${res.status}`;
        }
      } else if(item.action==='qcPatch') {
        // 质检判定离线队列：重试 PATCH
        const result = await CloudDB.update(item.id, item.patch);
        if(result) { ok++; }
        else { remaining.push(item); fail++; lastErrMsg='质检数据写入失败，请稍后重试'; }
      }
    } catch(e){
      remaining.push(item); fail++;
      if(e.name==='AbortError') lastErrMsg='连接超时，请检查网络或云端服务是否正常';
      else lastErrMsg='网络异常：'+e.message;
    }
  }
  saveOfflineQueue(remaining); updateOfflineBar();
  if(ok>0) showToast(`同步完成：${ok}条成功${fail>0?'，'+fail+'条失败':''}`, 'success');
  else showToast(lastErrMsg||'同步失败，请检查网络', 'error');
  if(ok>0) refreshTable();
}

   ============================================================ */
function compressImage(file,maxPx=PHOTO_MAX_PX,quality=PHOTO_QUALITY) {
  return new Promise((resolve,reject)=>{
    const reader=new FileReader(); reader.onerror=reject;
    reader.onload=e=>{
      const img=new Image(); img.onerror=reject;
      img.onload=()=>{
        let w=img.naturalWidth,h=img.naturalHeight;
        if(w>maxPx||h>maxPx){if(w>=h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}
        const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        const ctx=cv.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h); resolve(cv.toDataURL('image/jpeg',quality));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

   ============================================================ */
let _qrStream=null,_qrAnimReq=null,_qrTrack=null,_torchOn=false;
async function openQRScanner(){
  const modal=document.getElementById('qrModal'),video=document.getElementById('qrVideo');
  const canvas=document.getElementById('qrCanvas'),status=document.getElementById('qrStatus');
  modal.classList.remove('hidden');
  if(!navigator.mediaDevices?.getUserMedia){status.textContent='⚠️ 浏览器不支持摄像头';return;}
  try{
    status.textContent='正在启动摄像头...';
    _qrStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}});
    video.srcObject=_qrStream; _qrTrack=_qrStream.getVideoTracks()[0];
    const cap=_qrTrack.getCapabilities?.()||{};
    if(cap.torch)document.getElementById('qrTorchBtn').classList.remove('hidden');
    video.onloadedmetadata=()=>{
      video.play(); canvas.width=video.videoWidth; canvas.height=video.videoHeight;
      status.textContent='对准二维码 / 条形码进行扫描';
      _qrAnimReq=requestAnimationFrame(()=>qrScanLoop(video,canvas));
    };
  }catch(err){
    status.textContent=err.name==='NotAllowedError'?'⚠️ 请允许摄像头权限':err.name==='NotFoundError'?'⚠️ 未找到摄像头':'⚠️ '+err.message;
  }
}
function qrScanLoop(video,canvas){
  if(!_qrStream)return;
  const ctx=canvas.getContext('2d');
  if(video.readyState===video.HAVE_ENOUGH_DATA){
    if(canvas.width!==video.videoWidth||canvas.height!==video.videoHeight){canvas.width=video.videoWidth;canvas.height=video.videoHeight;}
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    const code=jsQR(ctx.getImageData(0,0,canvas.width,canvas.height).data,canvas.width,canvas.height,{inversionAttempts:'dontInvert'});
    if(code?.data){handleQRResult(code.data);return;}
  }
  _qrAnimReq=requestAnimationFrame(()=>qrScanLoop(video,canvas));
}

/** ★ 扫码结果 → 直接填入批次号 */
function handleQRResult(raw){
  const frame=document.getElementById('qrFrame');
  if(frame)frame.style.borderColor='#4ade80';
  if(navigator.vibrate)navigator.vibrate([80,50,80]);
  playBeep();

    stopQRScanner();
    // 扫码内容直接写入批次号字段

    showToast('扫码成功！内容已填入批次号','success');
  },300);
}

function stopQRScanner(){
  if(_qrAnimReq){cancelAnimationFrame(_qrAnimReq);_qrAnimReq=null;}
  if(_qrStream){_qrStream.getTracks().forEach(t=>t.stop());_qrStream=null;}
  const v=document.getElementById('qrVideo'); if(v)v.srcObject=null;
  document.getElementById('qrModal')?.classList.add('hidden');
  document.getElementById('qrTorchBtn')?.classList.add('hidden');
  document.getElementById('qrStatus').textContent='正在启动摄像头...';
  const f=document.getElementById('qrFrame'); if(f)f.style.borderColor=''; _torchOn=false;
}
async function toggleTorch(){if(!_qrTrack)return;_torchOn=!_torchOn;try{await _qrTrack.applyConstraints({advanced:[{torch:_torchOn}]});const b=document.getElementById('qrTorchBtn');if(b)b.textContent=_torchOn?'🔦 关闭手电':'🔦 手电筒';}catch{}}
function playBeep(){try{const a=new(window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(.3,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.25);o.start(a.currentTime);o.stop(a.currentTime+.25);}catch{}}

/** 保存新产品名称到配置 */
function saveNewProduct(prefix) {
  const input = document.getElementById(`${prefix}_newProductInput`);
  const hidden = document.getElementById(`${prefix}_productName`);
  const name = (input?.value||'').trim();
  if(!name){showToast('请输入产品名称','error');return;}
  if(name.length>50){showToast('产品名称最多50个字符','error');return;}

  const cfg = getConfig();
  if(!cfg.productOptions.includes(name)) {
    cfg.productOptions.push(name);
    saveConfig(cfg);
  }

  // 更新下拉框，添加新选项
  const sel = document.getElementById(`${prefix}_productSelect`);
  if(sel) {
    const exists = Array.from(sel.options).some(o=>o.value===name);
    if(!exists) {
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name;
      // 插入到 "新增..." 选项之前
      sel.insertBefore(opt, sel.lastElementChild);
    }
    sel.value = name;
  }
  hidden.value = name;
  document.getElementById(`${prefix}_newProductArea`)?.classList.add('hidden');
  if(input)input.value='';
  showToast(`"${name}" 已保存到产品列表`, 'success');
}

/** 读取并校验表单字段 */
function readFormFields(prefix='form') {
  const v = f => (document.getElementById(`${prefix}_${f}`)?.value?.trim()||'');
  const data = {
    date:       v('date'),
    productName:v('productName'),  // 来自隐藏域
    batchNo:    v('batchNo'),
    qty:        v('qty'),
    operator:   v('operator'),
    defectType: v('defectType'),
    dispose:    v('dispose'),
    remark:     v('remark'),
    dept: '',   // 保持DB兼容，发送空字符串
  };
  for(const[k,lbl] of [['date','发生日期'],['productName','产品名称'],['qty','不良数量'],['operator','操作员'],['defectType','不良类型'],['dispose','处置方式']]) {
    if(!data[k]) return {ok:false, error:`${lbl} 不能为空`};
  }
  if(isNaN(+data.qty)||+data.qty<1) return {ok:false, error:'不良数量必须为正整数'};
  data.qty=+data.qty;
  return {ok:true, data};
}

async function handleSubmit(e){
  e.preventDefault();
  const {ok,data,error}=readFormFields('form');

  const btn=document.getElementById('submitBtn');
  if(btn){btn.disabled=true;btn.textContent='提交中...';}
  saveMemory({operator:data.operator});

    const el=document.getElementById('form_'+f); if(!el)return;

let _refreshing=false;
/** 用已有数据直接渲染表格，skipFetch=true 时跳过网络请求 */
async function refreshTable(silent=false, skipFetch=false){
  if(_refreshing)return; _refreshing=true;
  try{
    const all = skipFetch ? _cachedRecords : await CloudDB.getAll();
    if(!skipFetch) _cachedRecords = all;
    const filtered=filterRecords(all,_ls.filters);
    filtered.sort((a,b)=>{
      let av=a[_ls.sortKey]??'',bv=b[_ls.sortKey]??'';
      if(_ls.sortKey==='qty'){av=+av;bv=+bv;}
      if(av<bv)return _ls.sortDir==='asc'?-1:1; if(av>bv)return _ls.sortDir==='asc'?1:-1; return 0;
    });
    const total=filtered.length,pageCount=Math.max(1,Math.ceil(total/_ls.pageSize));
    if(_ls.page>pageCount)_ls.page=pageCount;
    const start=(_ls.page-1)*_ls.pageSize,pageData=filtered.slice(start,start+_ls.pageSize);
    const sumQty=filtered.reduce((s,r)=>s+(+r.qty||0),0);
    const sumEl=document.getElementById('listSummary');
    if(sumEl)sumEl.innerHTML=`共 <b class="text-blue-700">${total}</b> 条，合计不良 <b class="text-red-600">${sumQty}</b> 件`;
    const tbody=document.getElementById('tableBody'),emptyEl=document.getElementById('emptyState');
    if(!tbody){_refreshing=false;return;}
    if(!pageData.length){tbody.innerHTML='';emptyEl?.classList.remove('hidden');}
    else{
      emptyEl?.classList.add('hidden');
      tbody.innerHTML=pageData.map((r,i)=>`
        <tr class="${_ls.selectedIds.has(r.id)?'selected-row':(i%2===0?'bg-white':'bg-gray-50')}" data-id="${r.id}" onclick="onRowClick(event,'${r.id}')">
          <td class="px-3 py-2.5 no-print" onclick="event.stopPropagation()"><input type="checkbox" class="w-4 h-4 rounded border-gray-300 cursor-pointer" ${_ls.selectedIds.has(r.id)?'checked':''} onchange="toggleSelectRow('${r.id}',this.checked)"/></td>
          <td class="px-3 py-2.5 whitespace-nowrap text-gray-700 text-xs">${esc(r.date)}</td>
          <td class="px-3 py-2.5 max-w-[120px] truncate font-medium" title="${esc(r.productName)}">${esc(r.productName)}${r.photos?.length?`<span class="text-blue-400 text-xs ml-1">📷${r.photos.length}</span>`:''}</td>
          <td class="px-3 py-2.5 text-gray-400 text-xs">${esc(r.batchNo||'-')}</td>
          <td class="px-3 py-2.5 font-bold text-red-600">${r.qty}</td>
          <td class="px-3 py-2.5 whitespace-nowrap"><span class="px-2 py-0.5 rounded bg-orange-100 text-orange-700 text-xs">${esc(r.defectType)}</span></td>
          <td class="px-3 py-2.5 whitespace-nowrap"><span class="px-2 py-0.5 rounded ${disposeColor(r.dispose)} text-xs">${esc(r.dispose)}</span></td>
          <td class="px-3 py-2.5 text-gray-700">${esc(r.operator)}</td>
          <td class="px-3 py-2.5 whitespace-nowrap"><span class="px-2 py-0.5 rounded text-xs ${qcStatusColor(r.qcStatus)}">${esc(r.qcStatus||'待质检判定')}</span></td>
          <td class="px-3 py-2.5 text-gray-600 text-xs whitespace-nowrap">${esc(r.qcJudge||'-')}</td>
          <td class="px-3 py-2.5 text-center whitespace-nowrap no-print" onclick="event.stopPropagation()">
            ${(!r.qcStatus||r.qcStatus==='待质检判定')?`<button onclick="openQCModal('${r.id}')" class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg bg-purple-50 hover:bg-purple-100 text-purple-700 text-xs mr-1">🔍 质检判定</button>`:''}
            <button onclick="openEditModal('${r.id}')" class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg bg-blue-50 hover:bg-blue-100 text-blue-700 text-xs mr-1">✏️ 编辑</button>
            <button onclick="openDeleteConfirm('${r.id}')" class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg bg-red-50 hover:bg-red-100 text-red-600 text-xs">🗑 删除</button>
          </td>
        </tr>`).join('');
    }
    const allChk=pageData.length>0&&pageData.every(r=>_ls.selectedIds.has(r.id));
    const ca=document.getElementById('checkAll'); if(ca)ca.checked=allChk;
    renderPagination(total,pageCount); syncBatchBtn();
  }finally{_refreshing=false;}
}

function disposeColor(d){const m={'返工':'bg-yellow-100 text-yellow-700','返修':'bg-blue-100 text-blue-700','报废':'bg-red-100 text-red-600','让步接收':'bg-purple-100 text-purple-700','退供应商':'bg-gray-100 text-gray-600'};return m[d]||'bg-gray-100 text-gray-600';}
function qcStatusColor(s){const m={'待质检判定':'bg-yellow-100 text-yellow-700','返修合格':'bg-green-100 text-green-700','返修不合格':'bg-red-100 text-red-600'};return m[s]||'bg-yellow-100 text-yellow-700';}
function renderPagination(total,pageCount){
  const pg=document.getElementById('pagination'); if(!pg)return;
  const pages=[]; for(let i=1;i<=pageCount;i++){if(i===1||i===pageCount||(i>=_ls.page-1&&i<=_ls.page+1))pages.push(i);else if(pages[pages.length-1]!=='...')pages.push('...');}
  pg.innerHTML=`
  <div class="flex items-center gap-1 flex-wrap">
    <button onclick="goPage(${_ls.page-1})" ${_ls.page<=1?'disabled':''} class="px-3 py-1.5 rounded-lg border border-gray-300 text-sm text-gray-600 disabled:opacity-40 hover:bg-gray-50">‹ 上一页</button>
    ${pages.map(p=>p==='...'?`<span class="px-2 text-gray-400">...</span>`:`<button onclick="goPage(${p})" class="w-8 h-8 rounded-lg text-sm ${p===_ls.page?'bg-blue-700 text-white font-bold':'border border-gray-300 text-gray-600 hover:bg-gray-50'}">${p}</button>`).join('')}
    <button onclick="goPage(${_ls.page+1})" ${_ls.page>=pageCount?'disabled':''} class="px-3 py-1.5 rounded-lg border border-gray-300 text-sm text-gray-600 disabled:opacity-40 hover:bg-gray-50">下一页 ›</button>
  </div>
  <div class="flex items-center gap-3">
    <span class="text-sm text-gray-500">每页</span>
    <select onchange="changePageSize(this.value)" class="px-2 py-1.5 rounded-lg border border-gray-300 text-sm bg-white">
      ${PAGE_SIZES.map(n=>`<option value="${n}" ${n===_ls.pageSize?'selected':''}>${n}条</option>`).join('')}
    </select>
    <span class="text-sm text-gray-500">第${_ls.page}/${pageCount}页，共${total}条</span>
  </div>`;
}
function goPage(p){_ls.page=p;refreshTable();}
function changePageSize(v){_ls.pageSize=+v;_ls.page=1;refreshTable();}
function sortBy(k){_ls.sortDir=_ls.sortKey===k?(_ls.sortDir==='asc'?'desc':'asc'):'desc';_ls.sortKey=k;refreshTable();}
function updateFilter(k,v){_ls.filters[k]=v;_ls.page=1;refreshTable();}
function clearFilters(){_ls.filters={defectType:'',dispose:'',operator:'',dateFrom:'',dateTo:'',keyword:'',qcStatus:''};_ls.page=1;_ls.selectedIds.clear();renderAdminTab();}
function toggleSelectAll(checked){
  const filtered=filterRecords(_cachedRecords,_ls.filters);
  const start=(_ls.page-1)*_ls.pageSize; filtered.slice(start,start+_ls.pageSize).forEach(r=>checked?_ls.selectedIds.add(r.id):_ls.selectedIds.delete(r.id)); syncBatchBtn(); refreshTable();
}
function toggleSelectRow(id,checked){checked?_ls.selectedIds.add(id):_ls.selectedIds.delete(id);syncBatchBtn();}
function syncBatchBtn(){
  const btn=document.getElementById('batchDelBtn'),cnt=document.getElementById('batchCount');
  if(!btn)return;
  const n=_ls.selectedIds.size;
  btn.style.display=n>0?'':'none';
  if(cnt)cnt.textContent=n;

  // 批量质检按钮：只统计勾选中「待质检判定」的条数（用缓存，支持云端模式）
  const qcBtn=document.getElementById('batchQCBtn'),qcCnt=document.getElementById('batchQCCount');
  if(!qcBtn)return;
  const pendingSelected=[..._ls.selectedIds].filter(id=>{
    const r=_cachedRecords.find(x=>x.id===id);
    return r&&(!r.qcStatus||r.qcStatus==='待质检判定');
  }).length;
  qcBtn.style.display=pendingSelected>0?'':'none';
  if(qcCnt)qcCnt.textContent=pendingSelected;
}
async function batchDelete(){const n=_ls.selectedIds.size;if(!n)return;openConfirm(`确定删除选中的${n}条？`,async()=>{await CloudDB.deleteMany([..._ls.selectedIds]);_ls.selectedIds.clear();showToast(`已删除${n}条`,'success');refreshTable();},'确认删除');}
function onRowClick(e,id){if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT')return;openDetailPanel(id);}
async function exportExcel(){
  const all=await CloudDB.getAll(),data=filterRecords(all,_ls.filters);
  if(!data.length){showToast('无数据可导出','warn');return;}
  const headers=['记录ID','日期','产品名称','批次号','不良数量','不良类型','处置方式','操作员','备注','照片数','审核状态','判定人','判定时间','质检备注','创建时间'];
  const rows=data.map(r=>[
    r.id, r.date, r.productName, r.batchNo||'', +r.qty, r.defectType, r.dispose,
    r.operator, r.remark||'', (r.photos||[]).length,
    r.qcStatus||'待质检判定', r.qcJudge||'',
    r.qcTime?new Date(r.qcTime).toLocaleString('zh-CN'):'',
    r.qcRemark||'',
    r.createdAt?new Date(r.createdAt).toLocaleString('zh-CN'):''
  ]);
  const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
  // 设置列宽
  ws['!cols']=[{wch:22},{wch:12},{wch:20},{wch:14},{wch:10},{wch:14},{wch:12},{wch:10},{wch:20},{wch:8},{wch:14},{wch:10},{wch:20},{wch:20},{wch:20}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'返工返修记录');
  const fileName=`返工返修记录_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.xlsx`;
  XLSX.writeFile(wb,fileName);
  showToast(`已导出${data.length}条`,'success');
}
function getSubmitLink() {
  const cc = getCloudConfig();
  const base = (cc.siteUrl || location.href.split('?')[0]).replace(/\/?$/, '/');
  return base + '?mode=submit';
}
function copySubmitLink() {
  const url = getSubmitLink();
  navigator.clipboard.writeText(url).then(()=>showToast('填报链接已复制！','success')).catch(()=>prompt('请复制此链接：',url));
}
/** 实时更新预览框 */
function updateSubmitLinkPreview() {
  const input = document.getElementById('cfg_siteUrl');
  const preview = document.getElementById('submitLinkPreview');
  if (!input || !preview) return;
  const base = (input.value.trim() || location.href.split('?')[0]).replace(/\/?$/, '/');
  preview.value = base + '?mode=submit';
}
/** 保存站点地址到云端配置 */
function saveSiteUrl() {
  const input = document.getElementById('cfg_siteUrl');
  const url = (input?.value || '').trim();
  if (!url) { showToast('请输入站点地址', 'error'); return; }
  const cc = getCloudConfig();
  saveCloudConfig({ ...cc, siteUrl: url.replace(/\/?$/, '/') });
  updateSubmitLinkPreview();
  showToast('填报链接已保存', 'success');
}

function closeDetailPanel(){document.getElementById('detailPanel').classList.add('hidden-panel');document.getElementById('detailOverlay').classList.add('hidden');}

let _editingId=null;
async function openEditModal(id){
  const r=applyQCStore(_cachedRecords).find(x=>x.id===id);if(!r){showToast('记录不存在','error');return;}
  _editingId=id;
  document.getElementById('editModalTitle').textContent=`编辑 — ${r.productName}`;

function _resetQCForm() {

async function saveQCResult() {
  const judge  = (document.getElementById('qcJudgeInput')?.value || '').trim();
  const remark = (document.getElementById('qcRemarkInput')?.value || '').trim();

  if (!judge) {
    showToast('判定人姓名不能为空', 'error');
    document.getElementById('qcJudgeInput')?.focus();
    return;
  }
  if (!_qcSelected) {
    showToast('请选择审核结果', 'error');
    return;
  }

  const patch = {
    qcStatus: _qcSelected,
    qcJudge:  judge,
    qcTime:   new Date().toISOString(),
    qcRemark: remark,
  };

  const submitBtn = document.querySelector('#qcModal button[onclick="saveQCResult()"]');
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = '保存中...'; }

  // ① 立即写入本地 QC store（持久化，轮询/刷新均不丢失）
  writeQCResults(_qcTargetIds, patch);

  // ② 同步更新内存缓存
  for (const id of _qcTargetIds) {
    const idx = _cachedRecords.findIndex(x => x.id === id);
    if (idx !== -1) _cachedRecords[idx] = { ..._cachedRecords[idx], ...patch };
  }

  const n = _qcTargetIds.length;
  const targetIds = [..._qcTargetIds];
  closeQCModal();
  _ls.selectedIds.clear();
  if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '✅ 提交判定'; }

  // ③ 立即用内存缓存渲染 UI，用户无感知延迟
  await refreshTable(false, true);
  if (_adminTab === 'stats') await updateCharts();
  showToast(`质检判定完成：${_qcSelected}（共 ${n} 条）`, 'success');

  // ④ 后台同步写 Supabase，暂停轮询防竞态，写完再恢复
  stopPolling();
  for (const id of targetIds) {
    try {
      const ok = await CloudDB.update(id, patch);
      if (!ok) throw new Error('update returned false');
    } catch(e) {
      console.warn('质检云端同步失败，已加入离线队列:', id, e);
      const q = getOfflineQueue();
      const exists = q.some(x => x.action === 'qcPatch' && x.id === id);
      if (!exists) { q.push({ action: 'qcPatch', id, patch }); saveOfflineQueue(q); updateOfflineBar(); }
    }
  }
  startPolling();
}

/** 把本地 QC store 中的所有结果同步到 Supabase（修复手机端不同步问题） */
async function syncQCToCloud() {
  if (!CloudDB.enabled()) { showToast('未配置云端连接', 'warn'); return; }
  const store = getQCStore();
  const entries = Object.entries(store);
  if (!entries.length) { showToast('本地无质检结果需要同步', 'info'); return; }
  const btn = document.getElementById('syncQCBtn');
  if (btn) { btn.disabled = true; btn.textContent = '同步中...'; }
  let ok = 0, fail = 0;
  for (const [id, patch] of entries) {
    try { await CloudDB.update(id, patch); ok++; }
    catch (e) { fail++; console.warn('QC同步失败:', id, e); }
  }
  if (btn) { btn.disabled = false; btn.textContent = '☁️ 同步质检结果到云端'; }
  showToast(`同步完成：${ok} 条成功${fail > 0 ? '，' + fail + ' 条失败' : ''}`, ok > 0 ? 'success' : 'error');
  if (ok > 0) refreshTable();
}

async function updateCharts(){

    ].map(c=>`

        <div class="flex items-start justify-between mb-3">
          <span class="text-2xl">${c.icon}</span>
          <span class="w-2 h-2 rounded-full ${c.dot} mt-1"></span>
        </div>
        <div class="${c.color} text-3xl font-bold tracking-tight mb-1">${c.val}</div>
        <div class="text-xs text-gray-500 font-medium">${c.label}</div>
      </div>`).join('');
  }
  const COLORS=['#3b82f6','#ef4444','#f59e0b','#10b981','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1'];
  const gQ=f=>{const m={};data.forEach(r=>{const k=r[f]||'未知';m[k]=(m[k]||0)+(+r.qty||0)});return m;};

  const dt=gQ('defectType');drawChart('chart_defectType','pie',Object.keys(dt),Object.values(dt),COLORS);
  const dm={};data.forEach(r=>{dm[r.date]=(dm[r.date]||0)+(+r.qty||0)});const sd=Object.keys(dm).sort();drawChart('chart_trend','line',sd,sd.map(d=>dm[d]),'#3b82f6');
  const ds=gQ('dispose');drawChart('chart_dispose','doughnut',Object.keys(ds),Object.values(ds),COLORS);
  const op=gQ('operator');drawChart('chart_operator','bar',Object.keys(op),Object.values(op),Object.keys(op).map((_,i)=>COLORS[i%COLORS.length]));
  // 审核状态分布（按条数）
  const qcMap={};data.forEach(r=>{const k=r.qcStatus||'待质检判定';qcMap[k]=(qcMap[k]||0)+1;});
  drawChart('chart_qcStatus','doughnut',Object.keys(qcMap),Object.values(qcMap),['#facc15','#4ade80','#f87171']);

function renderTop5(elId,map,color){
  const el=document.getElementById(elId);if(!el)return;
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,5);
  if(!sorted.length){el.innerHTML='<p class="text-gray-400 text-sm text-center py-4">暂无数据</p>';return;}
  const max=sorted[0][1]||1;
  el.innerHTML=sorted.map(([name,qty],i)=>`<div class="flex items-center gap-3 mb-3"><span class="w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold shrink-0 ${i===0?'bg-yellow-400 text-white':i===1?'bg-gray-400 text-white':i===2?'bg-orange-400 text-white':'bg-gray-200 text-gray-600'}">${i+1}</span><div class="flex-1 min-w-0"><div class="flex justify-between items-baseline mb-1"><span class="text-sm text-gray-700 truncate max-w-[60%]" title="${esc(name)}">${esc(name)}</span><span class="text-sm font-bold text-gray-800 shrink-0 ml-2">${qty}件</span></div><div class="w-full bg-gray-100 rounded-full h-2"><div class="h-2 rounded-full" style="width:${(qty/max*100).toFixed(1)}%;background:${color}"></div></div></div></div>`).join('');
}
function drawChart(canvasId,type,labels,values,colors){
  const canvas=document.getElementById(canvasId);if(!canvas)return;
  if(_charts[canvasId]){_charts[canvasId].destroy();delete _charts[canvasId];}
  if(!labels.length){const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#94a3b8';ctx.font='13px Microsoft YaHei';ctx.textAlign='center';ctx.fillText('暂无数据',canvas.width/2,canvas.height/2);return;}
  const isLine=type==='line';
  _charts[canvasId]=new Chart(canvas,{type,data:{labels,datasets:[{data:values,backgroundColor:isLine?'rgba(59,130,246,0.1)':(Array.isArray(colors)?colors:colors),borderColor:isLine?'#3b82f6':undefined,borderWidth:isLine?2:1,fill:isLine?true:undefined,tension:0.35,pointRadius:isLine?4:undefined,pointBackgroundColor:isLine?'#3b82f6':undefined}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:type!=='bar',position:'bottom',labels:{font:{size:11},padding:10,boxWidth:12}},tooltip:{callbacks:{label:ctx=>{const t=ctx.dataset.data.reduce((a,b)=>a+b,0);const p=t?((ctx.parsed.y??ctx.raw)/t*100).toFixed(1):0;return(type==='pie'||type==='doughnut')?` ${ctx.label}: ${ctx.raw} (${p}%)`:`${ctx.raw}`;}}}},scales:(type==='bar'||type==='line')?{y:{beginAtZero:true,ticks:{font:{size:11}},grid:{color:'#f1f5f9'}},x:{ticks:{font:{size:10}}}}:undefined}});
}

/** 保存基础配置（公司名、密码） */
function saveSettings(){
  const cfg=getConfig();
  cfg.companyName=(document.getElementById('cfg_companyName')?.value||'').trim();
  cfg.adminPassword=(document.getElementById('cfg_adminPassword')?.value||'');
  if(!cfg.companyName){showToast('公司名称不能为空','error');return;}
  saveConfig(cfg);showToast('基础配置已保存','success');updateHeaderInfo();
}

/** 保存产品名称列表 */
function saveProductOptions(){
  const cfg=getConfig();
  const lines=(document.getElementById('cfg_productOptions')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);
  cfg.productOptions=lines;
  saveConfig(cfg);showToast(`产品列表已保存（${lines.length}个）`,'success');
}

/** 保存分类配置 */
function saveClassifySettings(){
  const cfg=getConfig();
  const lines=id=>(document.getElementById(id)?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);
  cfg.defectTypeOptions=lines('cfg_defectTypeOptions');
  cfg.disposeOptions=lines('cfg_disposeOptions');
  if(!cfg.defectTypeOptions.length){showToast('不良类型不能为空','error');return;}
  if(!cfg.disposeOptions.length){showToast('处置方式不能为空','error');return;}
  saveConfig(cfg);showToast('分类配置已保存','success');
}

async function testAndSaveCloud(){
  const url=(document.getElementById('cfg_supabase_url')?.value||'').trim();
  const key=(document.getElementById('cfg_supabase_key')?.value||'').trim();
  if(!url&&!key){clearCloudConfig();return;}
  if(!url||!key){showToast('请同时填写 URL 和 Key','error');return;}
  const btn=document.querySelector('button[onclick="testAndSaveCloud()"]');
  if(btn){btn.textContent='测试中...';btn.disabled=true;}
  const result=await CloudDB.testConnection(url,key);
  if(btn){btn.textContent='✅ 测试并保存';btn.disabled=false;}
  if(!result.ok){showToast('连接失败：'+(result.msg||'未知'),'error');return;}
  saveCloudConfig({url,key});showToast('云端连接成功！','success');
  setCloudStatus('ok');startPolling();renderSettingsTab(document.getElementById('adminTabContent'));
  promptSyncLocalToCloud();
}
function clearCloudConfig(){openConfirm('确定清除云端配置？',()=>{saveCloudConfig({});setCloudStatus('local');stopPolling();showToast('已切回本地模式','info');renderSettingsTab(document.getElementById('adminTabContent'));});}

function promptSyncLocalToCloud(){
  const local=getAllRecordsLocal();if(!local.length)return;
  openConfirm(`检测到本地有${local.length}条记录，是否上传到云端？`,async()=>{
    let ok=0;
    for(const rec of local){try{const res=await CloudDB._fetch(CloudDB.base(),{method:'POST',headers:CloudDB.headers(),body:JSON.stringify(toDBRow(rec))});if(res.ok)ok++;}catch{}}
    if(ok>0){saveAllRecordsLocal([]);showToast(`已上传${ok}条到云端`,'success');refreshTable();}
    else showToast('上传失败，请检查网络','error');
  },'上传到云端');
}

async function renderStorageInfo(){
  const localList=getAllRecordsLocal();
  const raw=localStorage.getItem(LS_KEY)||'';const kb=(new Blob([raw]).size/1024).toFixed(1);const pct=Math.min(+kb/5120*100,100).toFixed(2);
  const el=document.getElementById('storageInfo');if(!el)return;
  let cloudCount='—';
  if(CloudDB.enabled()){try{const all=await CloudDB.getAll();cloudCount=all.length+'条';}catch{cloudCount='获取失败';}}
  el.innerHTML=`
  <div class="space-y-2 text-sm text-gray-600">
    ${CloudDB.enabled()?`<div class="flex justify-between"><span>☁️ 云端记录数</span><b class="text-blue-600">${cloudCount}</b></div>`:''}
    <div class="flex justify-between"><span>💾 本地缓存数</span><b>${localList.length}条</b></div>
    <div class="flex justify-between"><span>本地占用</span><b>${kb} KB / ~5MB</b></div>
    <div class="w-full bg-gray-200 rounded-full h-2 mt-2"><div class="h-2 rounded-full ${+pct>80?'bg-red-500':+pct>50?'bg-yellow-500':'bg-blue-500'}" style="width:${pct}%"></div></div>
    <p class="text-xs ${+pct>80?'text-red-500':'text-gray-400'}">已使用${pct}%${+pct>80?' ⚠️ 建议导出备份':''}</p>
  </div>`;
}

async function exportJSON(){
  const list=await CloudDB.getAll();if(!list.length){showToast('暂无数据','warn');return;}
  const blob=new Blob([JSON.stringify({version:1,exportTime:new Date().toISOString(),records:list},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`返工返修备份_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.json`;a.click();URL.revokeObjectURL(url);
  showToast(`已导出${list.length}条`,'success');
}
async function importJSON(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const json=JSON.parse(e.target.result);
      const incoming=json.records||(Array.isArray(json)?json:[]);
      if(!incoming.length){showToast('文件无有效记录','warn');return;}
      const existing=await CloudDB.getAll();const existIds=new Set(existing.map(r=>r.id));
      const fresh=incoming.filter(r=>r.id&&!existIds.has(r.id));
      let ok=0;
      if(CloudDB.enabled()){for(const rec of fresh){try{const res=await CloudDB._fetch(CloudDB.base(),{method:'POST',headers:CloudDB.headers(),body:JSON.stringify(toDBRow(rec))});if(res.ok)ok++;}catch{}}}
      else{fresh.forEach(r=>addRecordLocal(r));ok=fresh.length;}
      showToast(`导入成功，新增${ok}条`,'success');renderStorageInfo();
    }catch{showToast('JSON格式错误','error');}
  };
  reader.readAsText(file,'UTF-8');event.target.value='';
}
async function clearAllDataConfirm(){
  openConfirm(`确定清空${CloudDB.enabled()?'云端':'全部'}数据？不可恢复！`,async()=>{
    if(CloudDB.enabled()){const all=await CloudDB.getAll();const ids=all.map(r=>r.id);if(ids.length){const ic=ids.map(id=>encodeURIComponent(id)).join(',');await CloudDB._fetch(CloudDB.base()+`?id=in.(${ic})`,{method:'DELETE',headers:CloudDB.headers()});}}
    saveAllRecordsLocal([]);showToast('数据已清空','success');renderStorageInfo();
  },'确认清空');
}

   模块二十七：路由 & 初始化
   ============================================================ */
function getMode(){return(new URLSearchParams(location.search).get('mode')||'admin')==='submit'?'submit':'admin';}
function updateHeaderInfo(){
  const mode=getMode(),cfg=getConfig();
  const sub=document.getElementById('headerSubtitle'),badge=document.getElementById('modeBadge'),sw=document.getElementById('switchModeBtn');
  if(sub)sub.textContent=cfg.companyName;
  if(badge){badge.textContent=mode==='submit'?'员工填报模式':'管理员后台';badge.className=`hidden sm:inline-flex items-center px-2 py-1 rounded-full text-xs font-medium ${mode==='submit'?'bg-green-700 border border-green-500':'bg-blue-800 border border-blue-500'}`;}
  if(sw){sw.classList.remove('hidden');sw.textContent=mode==='submit'?'切换后台':'切换填报';sw.href=location.href.split('?')[0]+(mode==='submit'?'?mode=admin':'?mode=submit');}
  setCloudStatus(CloudDB.enabled()?'ok':'local');
}

/** 显示全屏加载遮罩 */
function showLoadingMask(msg='配置加载中...') {
  let el = document.getElementById('loadingMask');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loadingMask';
    el.style.cssText = 'position:fixed;inset:0;background:rgba(30,64,175,0.92);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;';
    el.innerHTML = `<div style="width:36px;height:36px;border:4px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite"></div><p style="color:#fff;font-size:14px;font-family:Microsoft YaHei,sans-serif">${msg}</p>`;
    document.body.appendChild(el);
  }
}
function hideLoadingMask() {
  document.getElementById('loadingMask')?.remove();
}

async function init(){
  updateHeaderInfo();
  updateOfflineBar();
  const mode = getMode();

  // 先从云端拉取最新配置（所有设备保持一致）
  showLoadingMask(mode === 'submit' ? '正在加载配置...' : '正在同步配置...');
  try {
    await pullConfigFromCloud();
  } catch(e) {
    console.warn('云端配置拉取失败，使用本地配置');
  }
  hideLoadingMask();

  updateHeaderInfo(); // 用最新配置刷新标题
  if (mode === 'submit') {
    renderSubmitPage();
  } else {
    checkAdminPassword();
    if (_adminUnlocked) renderAdminPage();
  }
}

window.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('editModal')?.addEventListener('click',e=>{if(e.target===document.getElementById('editModal'))closeEditModal();});
  document.getElementById('confirmModal')?.addEventListener('click',e=>{if(e.target===document.getElementById('confirmModal'))closeConfirmModal();});
  document.getElementById('qcModal')?.addEventListener('click',e=>{if(e.target===document.getElementById('qcModal'))closeQCModal();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeLightbox();stopQRScanner();closeEditModal();closeConfirmModal();closeQCModal();}});
  document.addEventListener('visibilitychange',()=>{if(!document.hidden&&CloudDB.enabled()&&_adminTab!=='settings')startPolling();else stopPolling();});
  window.addEventListener('online',()=>{showToast('网络已恢复','success');syncOfflineQueue();});
  window.addEventListener('offline',()=>{showToast('网络已断开，数据将暂存本地','warn');setCloudStatus('error');});
  init();
});
